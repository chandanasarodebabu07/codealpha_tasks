<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #4facfe;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        #chatbox {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f5f5f5;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #4facfe;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #e0e0e0;
            color: black;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ccc;
        }

        #userInput {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #3a8ee6;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">🤖 AI Chatbot</div>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;

    if (input.trim() === "") return;

    let chatbox = document.getElementById("chatbox");
    document.getElementById("userInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
    // User message
    let userMsg = `<div class="message user">${input}</div>`;
    chatbox.innerHTML += userMsg;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        let botMsg = `<div class="message bot">${data.response}</div>`;
        chatbox.innerHTML += botMsg;

        chatbox.scrollTop = chatbox.scrollHeight;
    });

    document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
